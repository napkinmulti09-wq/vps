name: Windows RDP via Localtonet

on:
  workflow_dispatch:
    inputs:
      localtonet_token:
        description: 'Masukkan AuthToken Localtonet Anda'
        required: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Enable RDP
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Set Admin Password
        shell: powershell
        run: |
          $net = new-object -com WScript.Network
          $user = [ADSI]"WinNT://$($net.ComputerName)/runneradmin"
          $user.SetPassword("P@ssword1234")

      - name: Install & Run Localtonet
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://localtonet.com/download/localtonet-win-x64.zip" -OutFile "localtonet.zip"
          Expand-Archive -Path "localtonet.zip" -DestinationPath "."
          Start-Process -FilePath ".\localtonet.exe" -ArgumentList "authtoken ${{ github.event.inputs.localtonet_token }}"

      - name: Keep Alive
        shell: powershell
        run: |
          Write-Host "==========================================" -ForegroundColor Green
          Write-Host "RDP BERHASIL DIAKTIFKAN!" -ForegroundColor Green
          Write-Host "USERNAME : runneradmin" -ForegroundColor Yellow
          Write-Host "PASSWORD : P@ssword1234" -ForegroundColor Yellow
          Write-Host "Cek Alamat/IP di Dashboard Localtonet Anda" -ForegroundColor Cyan
          Write-Host "==========================================" -ForegroundColor Green
          
          while ($true) {
            Start-Sleep -Seconds 300
          }
