name: Windows RDP via Ngrok

on:
  workflow_dispatch:
    inputs:
      ngrok_auth_token:
        description: 'Masukkan Ngrok Authtoken Anda'
        required: true
      rdp_password:
        description: 'Password Login RDP'
        required: true
        default: 'P@ssword1234'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Enable RDP
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Set Admin Password
        shell: powershell
        run: |
          $net = new-object -com WScript.Network
          $user = [ADSI]"WinNT://$($net.ComputerName)/runneradmin"
          $user.SetPassword("${{ github.event.inputs.rdp_password }}")

      - name: Install Ngrok
        shell: powershell
        run: |
          choco install ngrok --confirm --no-progress

      - name: Start Ngrok Service
        shell: powershell
        run: |
          ngrok config add-authtoken ${{ github.event.inputs.ngrok_auth_token }}
          Start-Process ngrok -ArgumentList "tcp 3389"

      - name: Keep Alive
        shell: powershell
        run: |
          Write-Host "==================================================" -ForegroundColor Green
          Write-Host "RDP BERHASIL DIAKTIFKAN!" -ForegroundColor Green
          Write-Host "USERNAME : runneradmin" -ForegroundColor Yellow
          Write-Host "PASSWORD : ${{ github.event.inputs.rdp_password }}" -ForegroundColor Yellow
          Write-Host "--------------------------------------------------" -ForegroundColor Cyan
          Write-Host "Cek alamat IP/Host RDP Anda di Dashboard Ngrok:" -ForegroundColor Cyan
          Write-Host "https://dashboard.ngrok.com/endpoints/status" -ForegroundColor Yellow
          Write-Host "==================================================" -ForegroundColor Green
          
          while ($true) {
            Start-Sleep -Seconds 300
          }
