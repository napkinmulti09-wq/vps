name: Windows RDP via Ngrok

on:
  workflow_dispatch:
    inputs:
      ngrok_auth_token:
        description: 'Masukkan Ngrok Authtoken Anda'
        required: true
      rdp_password:
        description: 'Password Login RDP'
        required: true
        default: 'P@ssword1234'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Enable RDP
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Set Admin Password
        shell: powershell
        run: |
          $net = new-object -com WScript.Network
          $user = [ADSI]"WinNT://$($net.ComputerName)/runneradmin"
          $user.SetPassword("${{ github.event.inputs.rdp_password }}")

      - name: Start Ngrok Tunnel
        uses: alerque/setup-ngrok@v1

      - name: Create RDP Tunnel
        shell: powershell
        run: |
          ngrok config add-authtoken ${{ github.event.inputs.ngrok_auth_token }}
          Start-Process ngrok -ArgumentList "tcp 3389 --log=stdout" -RedirectStandardOutput ngrok.log
          
          # Tunggu proses inisialisasi
          Start-Sleep -Seconds 10
          
          # Ambil URL dari log ngrok langsung
          $log = Get-Content ngrok.log -ErrorAction SilentlyContinue
          $url = ($log | Select-String -Pattern "url=tcp://(.*)").Matches.Value
          
          Write-Host "==========================================" -ForegroundColor Green
          if ($url) {
            Write-Host "KONEKSI RDP BERHASIL!" -ForegroundColor Green
            Write-Host "ALAMAT RDP : $url" -ForegroundColor Yellow
          } else {
            Write-Host "Gagal mengambil URL dari Log. Coba cek dashbaord Ngrok Anda." -ForegroundColor Red
          }
          Write-Host "USERNAME   : runneradmin" -ForegroundColor Yellow
          Write-Host "PASSWORD   : ${{ github.event.inputs.rdp_password }}" -ForegroundColor Yellow
          Write-Host "==========================================" -ForegroundColor Green

      - name: Keep Alive
        shell: powershell
        run: |
          while ($true) {
            Start-Sleep -Seconds 300
          }
