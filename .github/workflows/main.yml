name: Windows RDP via Serveo

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Enable RDP
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Set Admin Password
        shell: powershell
        run: |
          $net = new-object -com WScript.Network
          $user = [ADSI]"WinNT://$($net.ComputerName)/runneradmin"
          $user.SetPassword("P@ssword1234")

      - name: Start Serveo Tunnel
        shell: powershell
        run: |
          # Jalankan SSH tunnel ke Serveo
          $process = Start-Process ssh -ArgumentList "-o StrictHostKeyChecking=no -R 0:localhost:3389 serveo.net" -RedirectStandardOutput "serveo.log" -PassThru
          
          # Tunggu proses mengumpulkan log
          Start-Sleep -Seconds 10
          
          Write-Host "==========================================" -ForegroundColor Green
          Write-Host "ALAMAT RDP SERVEO:" -ForegroundColor Yellow
          Get-Content serveo.log | Select-String "Forwarding TCP"
          Write-Host "==========================================" -ForegroundColor Green
          Write-Host "USERNAME : runneradmin" -ForegroundColor Yellow
          Write-Host "PASSWORD : P@ssword1234" -ForegroundColor Yellow
          Write-Host "==========================================" -ForegroundColor Green

      - name: Keep Alive
        shell: powershell
        run: |
          while ($true) {
            Start-Sleep -Seconds 300
          }
