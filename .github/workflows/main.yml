name: Windows RDP via Tailscale

on:
  workflow_dispatch:
    inputs:
      tailscale_authkey:
        description: 'Masukkan Tailscale Auth Key'
        required: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Enable RDP
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Set Admin Password
        shell: powershell
        run: |
          $net = new-object -com WScript.Network
          $user = [ADSI]"WinNT://$($net.ComputerName)/runneradmin"
          $user.SetPassword("P@ssword1234")

      - name: Connect to Tailscale
        shell: powershell
        run: |
          # Download & Install Tailscale
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe" -OutFile "tailscale-setup.exe"
          Start-Process -FilePath ".\tailscale-setup.exe" -ArgumentList "/quiet" -Wait
          
          # Hubungkan ke akun Tailscale Anda
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey ${{ github.event.inputs.tailscale_authkey }}

      - name: Keep Alive
        shell: powershell
        run: |
          Write-Host "==========================================" -ForegroundColor Green
          Write-Host "RDP BERHASIL TERHUBUNG KE TAILSCALE!" -ForegroundColor Green
          Write-Host "Cek IP RDP di Aplikasi Tailscale HP Anda" -ForegroundColor Cyan
          Write-Host "USERNAME : runneradmin" -ForegroundColor Yellow
          Write-Host "PASSWORD : P@ssword1234" -ForegroundColor Yellow
          Write-Host "==========================================" -ForegroundColor Green
          
          while ($true) {
            Start-Sleep -Seconds 300
          }
