name: Windows RDP Environment

on:
  workflow_dispatch:
    inputs:
      crd_code:
        description: 'Perintah Otorisasi PowerShell dari Chrome Remote Desktop'
        required: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Download & Install Chrome Remote Desktop
        shell: powershell
        run: |
          $url = "https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi"
          Invoke-WebRequest -Uri $url -OutFile "chromeremotedesktophost.msi"
          Start-Process msiexec.exe -ArgumentList '/i chromeremotedesktophost.msi /quiet /norestart' -Wait

      - name: Setup Chrome Remote Desktop
        shell: powershell
        run: |
          ${{ github.event.inputs.crd_code }} --pin=123456

      - name: Keep Alive
        shell: powershell
        run: |
          while ($true) {
            Start-Sleep -Seconds 300
          }
