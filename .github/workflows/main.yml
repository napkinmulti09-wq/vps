name: Windows RDP via Serveo

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Enable RDP
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Set Admin Password
        shell: powershell
        run: |
          $net = new-object -com WScript.Network
          $user = [ADSI]"WinNT://$($net.ComputerName)/runneradmin"
          $user.SetPassword("P@ssword1234")

      - name: Start Serveo Tunnel
        shell: powershell
        run: |
          # Buat Port acak antara 10000-50000
          $port = Get-Random -Minimum 10000 -Maximum 50000
          Write-Host "Mencoba membuat tunnel pada port: $port"
          
          # Jalankan SSH tunnel ke Serveo dengan port spesifik
          Start-Process ssh -ArgumentList "-o StrictHostKeyChecking=no -R ${port}:localhost:3389 serveo.net" -RedirectStandardOutput "serveo.log"
          
          Start-Sleep -Seconds 10
          
          Write-Host "==========================================" -ForegroundColor Green
          Write-Host "ALAMAT RDP ANDA:" -ForegroundColor Yellow
          Write-Host "serveo.net:$port" -ForegroundColor Cyan
          Write-Host "==========================================" -ForegroundColor Green
          Write-Host "USERNAME : runneradmin" -ForegroundColor Yellow
          Write-Host "PASSWORD : P@ssword1234" -ForegroundColor Yellow
          Write-Host "==========================================" -ForegroundColor Green

      - name: Keep Alive
        shell: powershell
        run: |
          while ($true) {
            Start-Sleep -Seconds 300
          }
