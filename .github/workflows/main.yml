name: Windows RDP via Ngrok

on:
  workflow_dispatch:
    inputs:
      ngrok_auth_token:
        description: 'Masukkan Ngrok Authtoken Anda'
        required: true
      rdp_password:
        description: 'Password untuk Login RDP (minimal 8 karakter)'
        required: true
        default: 'P@ssword1234'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Enable RDP
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Set Admin Password
        shell: powershell
        run: |
          $net = new-object -com WScript.Network
          $user = [ADSI]"WinNT://$($net.ComputerName)/runneradmin"
          $user.SetPassword("${{ github.event.inputs.rdp_password }}")

      - name: Install & Run Ngrok
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://bin.equinox.io/c/b3M412wjqqc/ngrok-v3-stable-windows-amd64.zip" -OutFile "ngrok.zip"
          Expand-Archive -Path "ngrok.zip" -DestinationPath "."
          .\ngrok.exe config add-authtoken ${{ github.event.inputs.ngrok_auth_token }}
          Start-Process -FilePath ".\ngrok.exe" -ArgumentList "tcp 3389"

      - name: Get Connection Info
        shell: powershell
        run: |
          Start-Sleep -Seconds 5
          $response = Invoke-RestMethod -Uri "http://localhost:4040/api/tunnels"
          $public_url = $response.tunnels[0].public_url
          Write-Host "==========================================" -ForegroundColor Green
          Write-Host "ALAMAT RDP ANDA: $public_url" -ForegroundColor Yellow
          Write-Host "USERNAME: runneradmin" -ForegroundColor Yellow
          Write-Host "==========================================" -ForegroundColor Green

      - name: Keep Alive
        shell: powershell
        run: |
          while ($true) {
            Start-Sleep -Seconds 300
          }
