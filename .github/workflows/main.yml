name: Windows RDP via Ngrok

on:
  workflow_dispatch:
    inputs:
      ngrok_auth_token:
        description: 'Masukkan Ngrok Authtoken Anda'
        required: true
      rdp_password:
        description: 'Password Login RDP'
        required: true
        default: 'P@ssword1234'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Enable RDP
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Set Admin Password
        shell: powershell
        run: |
          $net = new-object -com WScript.Network
          $user = [ADSI]"WinNT://$($net.ComputerName)/runneradmin"
          $user.SetPassword("${{ github.event.inputs.rdp_password }}")

      - name: Install & Run Ngrok
        shell: powershell
        run: |
          choco install ngrok --confirm --no-progress
          ngrok config add-authtoken ${{ github.event.inputs.ngrok_auth_token }}
          
          # Jalankan ngrok dan simpan output log
          Start-Process ngrok -ArgumentList "tcp 3389 --log=stdout" -RedirectStandardOutput "ngrok.log"
          Start-Sleep -Seconds 10
          
          # Tampilkan log di konsol GitHub
          Get-Content ngrok.log

      - name: Keep Alive
        shell: powershell
        run: |
          while ($true) {
            Start-Sleep -Seconds 300
          }
