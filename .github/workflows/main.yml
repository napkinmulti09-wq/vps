name: Windows RDP via Bore

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Enable RDP
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Set Admin Password
        shell: powershell
        run: |
          $net = new-object -com WScript.Network
          $user = [ADSI]"WinNT://$($net.ComputerName)/runneradmin"
          $user.SetPassword("P@ssword1234")

      - name: Start Bore Tunnel
        shell: powershell
        run: |
          # Download aplikasi Bore
          Invoke-WebRequest -Uri "https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-pc-windows-msvc.zip" -OutFile "bore.zip"
          Expand-Archive -Path "bore.zip" -DestinationPath "."
          
          # Jalankan tunnel
          Start-Process -FilePath ".\bore.exe" -ArgumentList "local 3389 --to bore.pub" -RedirectStandardOutput "bore.log" -RedirectStandardError "bore_err.log"
          
          # Tunggu koneksi stabil
          Start-Sleep -Seconds 10
          
          Write-Host "==========================================" -ForegroundColor Green
          Write-Host "ALAMAT RDP ANDA:" -ForegroundColor Yellow
          
          # Menampilkan Port yang didapat
          $log = Get-Content bore.log
          $log | Select-String "listening at bore.pub"
          
          Write-Host "==========================================" -ForegroundColor Green
          Write-Host "USERNAME : runneradmin" -ForegroundColor Yellow
          Write-Host "PASSWORD : P@ssword1234" -ForegroundColor Yellow
          Write-Host "==========================================" -ForegroundColor Green

      - name: Keep Alive
        shell: powershell
        run: |
          while ($true) {
            Start-Sleep -Seconds 300
          }
